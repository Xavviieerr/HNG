<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo Card</title>
    <link rel="stylesheet" href="styles.css" />
</head>

<body>

    <main>
        <article data-testid="test-todo-card" class="card">

            <!-- Image -->
            <div class="image-wrapper">
                <img src="https://ntvb.tmsimg.com/assets/p31942675_v_h10_aa.jpg" alt="Task preview" />
            </div>

            <!-- Title -->
            <h3 data-testid="test-todo-title" id="todo-title">
                Finish SaaS landing page
            </h3>

            <!-- Description -->
            <p data-testid="test-todo-description">
                Build hero section, pricing, and footer
            </p>

            <!-- Priority and status -->
            <div class="row">
                <span data-testid="test-todo-priority" id="priority" aria-label="Priority: Low" class="badge low">
                    Low 🟢
                </span>

                <span data-testid="test-todo-status" id="status" aria-label="Status: In Progress" class="badge status">
                    In Progress
                </span>
            </div>

            <!-- Dates -->
            <div class="dates">
                <time data-testid="test-todo-due-date" id="dueDate" datetime="2026-02-18T12:00:00Z">
                    Due Feb 18, 2026
                </time>

                <time data-testid="test-todo-time-remaining" id="timeRemaining" aria-live="polite">
                    calculating...
                </time>
            </div>

            <!-- Checkbox -->
            <label class="checkbox">
                <input type="checkbox" id="toggle" data-testid="test-todo-complete-toggle" />
                <span>Mark as complete</span>
            </label>

            <!-- Tags -->
            <ul role="list" data-testid="test-todo-tags" class="tags">
                <li data-testid="test-todo-tag-work">#work</li>
                <li data-testid="test-todo-tag-urgent">#urgent</li>
                <li data-testid="test-todo-tag-design">#design</li>
            </ul>

            <!-- Buttons -->
            <div class="actions">
                <button data-testid="test-todo-edit-button" id="editBtn">
                    Edit
                </button>

                <button data-testid="test-todo-delete-button" id="deleteBtn">
                    Delete
                </button>
            </div>

        </article>
    </main>

    <script src="script.js"></script>
</body>

</html>
