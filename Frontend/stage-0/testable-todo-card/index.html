<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Advanced Todo Card</title>
    <link rel="stylesheet" href="styles.css" />
</head>

<body>

    <main>
        <article class="card" data-testid="test-todo-card">

            <!-- TITLE -->
            <h3 id="title" data-testid="test-todo-title"></h3>

            <!-- DESCRIPTION -->
            <div id="collapsible" data-testid="test-todo-collapsible-section">
                <p id="description" data-testid="test-todo-description"></p>
            </div>

            <button id="expandBtn" data-testid="test-todo-expand-toggle" aria-expanded="false"
                aria-controls="collapsible" tabindex="3">Expand</button>

            <!-- PRIORITY -->
            <div class="row">
                <span id="priority" data-testid="test-todo-priority">
                    <span id="priorityIndicator" data-testid="test-todo-priority-indicator"></span>
                    <span id="priorityText"></span>
                </span>

                <!-- STATUS CONTROL -->
                <select id="statusControl" data-testid="test-todo-status-control" aria-label="Task status" tabindex="2">
                    <option>Pending</option>
                    <option>In Progress</option>
                    <option>Done</option>
                </select>
            </div>

            <!-- STATUS DISPLAY -->
            <span id="statusDisplay" data-testid="test-todo-status"></span>

            <!-- DATES -->
            <time id="dueDate" data-testid="test-todo-due-date"></time>
            <time id="timeRemaining" data-testid="test-todo-time-remaining" aria-live="polite"></time>

            <span id="overdue" data-testid="test-todo-overdue-indicator" class="hidden">
                Overdue
            </span>

            <!-- CHECKBOX -->
            <label>
                <input type="checkbox" id="checkbox" data-testid="test-todo-complete-toggle" tabindex="1" />
                Mark as complete
            </label>

            <!-- TAGS -->
            <ul role="list" data-testid="test-todo-tags" class="tags">
                <li data-testid="test-todo-tag-work">#work</li>
                <li data-testid="test-todo-tag-urgent">#urgent</li>
                <li data-testid="test-todo-tag-design">#design</li>
            </ul>

            <!-- BUTTONS -->
            <div id="editAndDeleteButtons" class="actions">
                <button id="editBtn" data-testid="test-todo-edit-button" tabindex="4">Edit</button>
                <button id="deleteBtn" data-testid="test-todo-delete-button" tabindex="5">Delete</button>
            </div>

            <!-- EDIT FORM -->
            <form id="editForm" data-testid="test-todo-edit-form" class="hidden">
                <label for="editTitle">Title</label>
                <input id="editTitle" type="text" data-testid="test-todo-edit-title-input" tabindex="6" />

                <label for="editDesc">Description</label>
                <textarea id="editDesc" data-testid="test-todo-edit-description-input" tabindex="7"></textarea>

                <label for="editPriority">Priority</label>
                <select id="editPriority" data-testid="test-todo-edit-priority-select" tabindex="8">
                    <option>Low</option>
                    <option>Medium</option>
                    <option>High</option>
                </select>

                <label for="editDate">Due Date</label>
                <input type="datetime-local" id="editDate" data-testid="test-todo-edit-due-date-input" tabindex="9" />

                <div class="actions">
                    <button type="button" id="saveBtn" data-testid="test-todo-save-button" tabindex="10">Save</button>
                    <button type="button" id="cancelBtn" data-testid="test-todo-cancel-button"
                        tabindex="11">Cancel</button>
                </div>
            </form>

        </article>
    </main>

    <script src="script.js"></script>
</body>

</html>
